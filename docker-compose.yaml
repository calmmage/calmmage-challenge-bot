services:
  mongodb:
    image: mongo:7
    ports:
      - "27017:27017"
    volumes:
      - mongodb_data:/data/db

  bot:
    build:
      context: .
      dockerfile: Dockerfile
    env_file:
      - .env
    environment:
      BOTSPOT_MONGO_DATABASE_CONN_STR: mongodb://mongodb:27017
    volumes:
      - ./sessions:/app/sessions
    depends_on:
      mongodb:
        condition: service_started
    restart: unless-stopped

volumes:
  mongodb_data:
